<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Brain Games Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #250a52;
            --purple-light: #46178f;
            --blue: #3498db;
            --red: #e74c3c;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --white: #ffffff;
            --pink: #ff4757;
            --orange: #ffa502;
            --cyan: #00eaef;
            --purple: #bf55ec;
            --gray: #7f8c8d;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, var(--purple-light), var(--purple-dark));
            color: white; margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* TELA INICIAL */
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px; text-align: center; overflow-y: auto;
        }
        .logo { font-size: 3.5rem; font-weight: 900; margin-bottom: 30px; text-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px; width: 100%; max-width: 1200px;
        }
        .game-card {
            background: white; color: #333; padding: 20px 15px; border-radius: 20px;
            cursor: pointer; border-bottom: 6px solid #ccc; font-weight: 900; font-size: 0.95rem;
        }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card span { font-size: 2rem; display: block; margin-bottom: 5px; }

        /* INTERFACE DE JOGO */
        #game-interface { display: none; flex: 1; position: relative; width: 100%; height: 100%; }
        
        .sidebar {
            width: 300px; background: rgba(0,0,0,0.3); padding: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; width: 100%; }

        /* JOGO DAS CORES */
        .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 380px; width: 100%; }
        .pad {
            aspect-ratio: 1; border-radius: 25px; cursor: pointer;
            position: relative; border: 5px solid rgba(0,0,0,0.2); width: 100%;
        }
        .pad.active { transform: scale(0.95); box-shadow: 0 0 60px white; filter: brightness(1.6); }
        
        /* BOTÕES GERAIS */
        #opts { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; max-width: 650px; }
        
        /* GRID EXCLUSIVO DO TESTE STROOP REFORMULADO */
        #stroop-opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 700px; }

        .stroop-btn {
            padding: 22px 20px; border-radius: 18px; border: none; font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem; font-weight: 900; color: white; cursor: pointer; text-shadow: 2px 3px 6px rgba(0,0,0,0.6);
            box-shadow: 0 8px 0 rgba(0,0,0,0.3); text-align: center; min-width: 150px;
        }
        .stroop-btn:hover { transform: translateY(-3px); box-shadow: 0 11px 0 rgba(0,0,0,0.3); }
        .stroop-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.3); }

        .timer-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--red); background: rgba(255,255,255,0.1); }
        .btn-exit { position: absolute; top: 20px; right: 30px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 900; z-index: 10; }
        
        /* MEMÓRIA e GERAIS */
        .mem-card { 
            background: var(--blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-bottom: 5px solid rgba(0,0,0,0.3); user-select: none; font-weight: 900;
        }

        /* TIRO AO ALVO */
        .target-bubble {
            position: absolute; border-radius: 50%; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-weight: 900; color: white; border: 4px solid rgba(0,0,0,0.2);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3); animation: scaleUp 0.2s ease;
        }
        @keyframes scaleUp { from { transform: scale(0); } to { transform: scale(1); } }

        @media (max-width: 768px) {
            #home-screen { padding: 20px 15px; justify-content: flex-start; }
            .logo { font-size: 1.8rem; margin-top: 10px; margin-bottom: 20px; }
            .menu-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
            .game-card { padding: 12px 6px; font-size: 0.75rem; border-bottom-width: 4px; }
            .game-card span { font-size: 1.3rem; }

            #game-interface { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; padding: 10px 15px; border-right: none; border-bottom: 2px solid rgba(255,255,255,0.1); justify-content: space-between; }
            .sidebar h1 { font-size: 1rem; }
            .sidebar p { margin: 0; font-size: 0.7rem; }
            .sidebar > div:last-child { display: none; }
            .timer-circle { width: 45px; height: 45px; font-size: 1.1rem; border-width: 3px; }
            .main-stage { padding: 15px; }
            .btn-exit { position: absolute; top: 12px; right: 12px; padding: 4px 8px; font-size: 0.65rem; }
            
            #opts, #stroop-opts { gap: 10px; width: 100%; }
            .stroop-btn { font-size: 1.2rem; padding: 15px 10px; border-radius: 12px; min-width: 110px; }
            .color-grid { max-width: 250px; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="logo">🧠 ACADEMIA DA ATENÇÃO ⚡</div>
        <div class="menu-grid">
            <div class="game-card" onclick="loadGame('cores')" style="border-color: var(--yellow)"><span>✨</span>GÊNIO DAS CORES</div>
            <div class="game-card" onclick="loadGame('memoria')" style="border-color: var(--blue)"><span>🔢</span>PARES NUMÉRICOS</div>
            <div class="game-card" onclick="loadGame('calculo')" style="border-color: var(--red)"><span>➕</span>CÁLCULO RÁPIDO</div>
            <div class="game-card" onclick="loadGame('foco')" style="border-color: var(--green)"><span>🎯</span>FOCO SELETIVO</div>
            <div class="game-card" onclick="loadGame('ordem')" style="border-color: var(--pink)"><span>🔡</span>ORDEM CRESCENTE</div>
            <div class="game-card" onclick="loadGame('reacao')" style="border-color: #333"><span>🚀</span>VELOCIDADE LUZ</div>
            <div class="game-card" onclick="loadGame('stroop')" style="border-color: var(--orange)"><span>🎨</span>TESTE STROOP</div>
            <div class="game-card" onclick="loadGame('alvo')" style="border-color: var(--pink)"><span>🎈</span>TIRO AO ALVO SÚBITO</div>
            <div class="game-card" onclick="loadGame('procurar')" style="border-color: var(--cyan)"><span>🔎</span>CADÊ O NÚMERO?</div>
            <div class="game-card" onclick="loadGame('invasao')" style="border-color: var(--purple)"><span>🛸</span>INVASÃO DE EMOJIS</div>
            <div class="game-card" onclick="loadGame('simon_inverso')" style="border-color: var(--yellow)"><span>🔴</span>SIMON ANTISSOCIAL</div>
            <div class="game-card" onclick="loadGame('balanca')" style="border-color: var(--blue)"><span>⚖️</span>BALANÇA MENTAL</div>
            <div class="game-card" onclick="loadGame('sinal')" style="border-color: var(--green)"><span>🛑</span>PARE OU SIGA</div>
        </div>
    </div>

    <div id="game-interface">
        <button class="btn-exit" onclick="location.reload()">SAIR ➔</button>
        <div class="sidebar">
            <div style="text-align:center">
                <h1 id="mode-title" style="margin:0">JOGO</h1>
                <p>Level: <span id="lvl">1</span> | Score: <span id="scr">0</span></p>
            </div>
            <div class="timer-circle" id="timer">15</div>
            <div style="background:white; color:black; padding:12px; border-radius:12px; font-weight:900; text-align:center; font-size: 0.85rem">
                FOCO TOTAL!
            </div>
        </div>
        <div class="main-stage" id="stage"></div>
    </div>

    <script>
        let mode = ''; let level = 1; let score = 0; let timeLeft = 15;
        let timerId; let internalSeq = []; let playerSeq = []; let gameActive = false;
        let gameLoopInterval = null;

        const icons = ['🐶','🚀','🧠','💎','🔥','⭐','🌈','👾','🍀','🍕','🦁','🛸','🍎','🎸','👑','🎈','🚗','🦊','🦈','🍩'];

        function loadGame(m) {
            mode = m; level = 1; score = 0;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'flex';
            document.getElementById('mode-title').innerText = m.toUpperCase().replace('_', ' ');
            initLevel();
        }

        function clearAllMechanics() {
            clearInterval(timerId);
            if(gameLoopInterval) { clearInterval(gameLoopInterval); gameLoopInterval = null; }
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            stage.removeAttribute('style');
            stage.className = 'main-stage';
        }

        function initLevel() {
            gameActive = true; 
            timeLeft = mode === 'alvo' ? 20 : 15;
            document.getElementById('lvl').innerText = level;
            document.getElementById('scr').innerText = score;
            
            clearAllMechanics();
            const stage = document.getElementById('stage');

            if (mode === 'cores') playCores(stage);
            else if (mode === 'memoria') playMemoria(stage);
            else if (mode === 'calculo') playCalculo(stage);
            else if (mode === 'foco') playFoco(stage);
            else if (mode === 'ordem') playOrdem(stage);
            else if (mode === 'reacao') playReacao(stage);
            else if (mode === 'stroop') playStroop(stage);
            else if (mode === 'alvo') playAlvo(stage);
            else if (mode === 'procurar') playProcurar(stage);
            else if (mode === 'invasao') playInvasao(stage);
            else if (mode === 'simon_inverso') playSimonInverso(stage);
            else if (mode === 'balanca') playBalanca(stage);
            else if (mode === 'sinal') playSinal(stage);

            startTimer();
        }

        // --- 1. GÊNIO DAS CORES ---
        function playCores(stage) {
            stage.innerHTML = `<div class="color-grid"><div class="pad" style="background:var(--blue)" onclick="handleColorClick(this,0)"></div><div class="pad" style="background:var(--red)" onclick="handleColorClick(this,1)"></div><div class="pad" style="background:var(--green)" onclick="handleColorClick(this,2)"></div><div class="pad" style="background:var(--yellow)" onclick="handleColorClick(this,3)"></div></div>`;
            internalSeq = Array.from({length: level + 1}, () => Math.floor(Math.random() * 4)); playerSeq = []; runSequence();
        }
        async function runSequence() {
            gameActive = false;
            for (let id of internalSeq) { await new Promise(r => setTimeout(r, 500)); const p = document.querySelectorAll('.pad')[id]; if(p) { p.classList.add('active'); setTimeout(() => p.classList.remove('active'), 350); } }
            gameActive = true;
        }
        function handleColorClick(el, id) {
            if (!gameActive) return; el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 200); playerSeq.push(id);
            if (playerSeq[playerSeq.length-1] !== internalSeq[playerSeq.length-1]) { alert("Sequência Errada!"); location.reload(); }
            else if (playerSeq.length === internalSeq.length) { score += 50; level++; setTimeout(initLevel, 600); }
        }

        // --- 2. PARES NUMÉRICOS ---
        function playMemoria(stage) {
            let pairs = Math.min(10, 1 + level); let totalCards = pairs * 2;
            let deck = [...icons.slice(0, pairs), ...icons.slice(0, pairs)].sort(() => Math.random() - 0.5); let flipped = [];
            let cols = totalCards % 5 === 0 ? 5 : 4;
            stage.innerHTML = `<p style="font-size:1.1rem; margin-bottom:15px; font-weight:700; text-align:center;">ENCONTRE OS PARES!</p><div id="mem-grid" style="display:grid; grid-template-columns:repeat(${cols}, 1fr); gap:10px; width:100%; max-width:400px;"></div>`;
            const grid = stage.querySelector('#mem-grid');
            deck.forEach((icon, i) => {
                const c = document.createElement('div'); c.className = 'mem-card'; c.style.aspectRatio = '1'; c.style.fontSize = '1.5rem'; c.innerText = i + 1;
                c.onclick = () => {
                    if (flipped.length < 2 && !c.classList.contains('flipped')) {
                        c.classList.add('flipped'); c.innerText = icon; c.style.background = 'white'; c.style.color = 'black'; flipped.push(c);
                        if (flipped.length === 2) {
                            if (flipped[0].innerText === flipped[1].innerText) { score += 20; flipped = []; if (grid.querySelectorAll('.flipped').length === deck.length) { level++; setTimeout(initLevel, 800); } }
                            else { setTimeout(() => { flipped.forEach(x => { x.classList.remove('flipped'); x.innerText = deck.indexOf(x.innerText) + 1; x.style.background = 'var(--blue)'; x.style.color = 'white'; }); flipped = []; }, 700); }
                        }
                    }
                };
                grid.appendChild(c);
            });
        }

        // --- 3. CÁLCULO RÁPIDO ---
        function playCalculo(stage) {
            let a = Math.floor(Math.random() * (5 * level)) + 2, b = Math.floor(Math.random() * (5 * level)) + 2; let res = a + b;
            stage.innerHTML = `<h1 style="font-size:3.5rem; margin: 0 0 20px 0; text-align:center;">${a} + ${b} = ?</h1><div id="opts"></div>`;
            [res, res+2, res-1, res+4].sort(() => Math.random()-0.5).forEach(o => {
                const btn = document.createElement('button'); btn.className = 'stroop-btn'; btn.style.background = 'var(--blue)'; btn.innerText = o;
                btn.onclick = () => { if(o === res) { score += 30; level++; initLevel(); } else { alert("Errado!"); location.reload(); } };
                stage.querySelector('#opts').appendChild(btn);
            });
        }

        // --- 4. FOCO SELETIVO ---
        function playFoco(stage) {
            let chars = ['M', 'W', 'N']; let main = chars[level % 3], intruder = 'H';
            let wrapper = document.createElement('div');
            wrapper.style.display = 'flex'; wrapper.style.flexWrap = 'wrap'; wrapper.style.justifyContent = 'center'; wrapper.style.maxWidth = '450px';
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:15px; text-align:center;">ACHE A LETRA '${intruder}'</p>`;
            
            for(let i=0; i < Math.min(100, 35 + (level*5)); i++) {
                const d = document.createElement('span'); d.style.fontSize = '2rem'; d.style.padding = '5px'; d.style.cursor = 'pointer'; d.innerText = main;
                if(i === 18) { d.innerText = intruder; d.onclick = () => { score += 40; level++; initLevel(); } }
                else { d.onclick = () => { alert("Incorreto!"); location.reload(); } }
                wrapper.appendChild(d);
            }
            stage.appendChild(wrapper);
        }

        // --- 5. ORDEM CRESCENTE ---
        function playOrdem(stage) {
            let nums = Array.from({length: Math.min(12, 3+level)}, () => Math.floor(Math.random()*100)); let sorted = [...nums].sort((a,b) => a-b); let idx = 0;
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:15px; text-align:center;">CLIQUE EM ORDEM CRESCENTE!</p><div id="opts"></div>`;
            const container = stage.querySelector('#opts');
            nums.forEach(n => {
                const b = document.createElement('div'); b.className = 'mem-card'; b.style.width='65px'; b.style.height='65px'; b.style.fontSize='1.4rem'; b.innerText = n;
                b.onclick = () => { if(n === sorted[idx]) { b.style.background = 'var(--gray)'; b.style.opacity = '0.4'; b.style.pointerEvents = 'none'; idx++; if(idx === nums.length) { score += 50; level++; initLevel(); } } else { alert("Ordem errada!"); location.reload(); } };
                container.appendChild(b);
            });
        }

        // --- 6. VELOCIDADE LUZ ---
        function playReacao(stage) {
            stage.innerHTML = '<h1 style="text-align:center;">AGUARDE O VERDE...</h1>';
            setTimeout(() => {
                if(mode !== 'reacao') return;
                stage.innerHTML = '<div id="target" style="width:200px;height:200px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow: 0 0 30px var(--green)"><h1>CLIQUE!</h1></div>';
                stage.querySelector('#target').onclick = () => { score += 100; level++; initLevel(); };
            }, 1000 + Math.random() * 2000);
        }

        // --- 7. TESTE STROOP REFORMULADO (MÁXIMA INTERFERÊNCIA E BOTÕES GRANDES) ---
        function playStroop(stage) {
            const palette = [
                { name: 'AZUL', color: 'var(--blue)' }, { name: 'VERMELHO', color: 'var(--red)' },
                { name: 'VERDE', color: 'var(--green)' }, { name: 'AMARELO', color: 'var(--yellow)' },
                { name: 'ROSA', color: 'var(--pink)' }, { name: 'LARANJA', color: 'var(--orange)' },
                { name: 'CIANO', color: 'var(--cyan)' }, { name: 'ROXO', color: 'var(--purple)' }
            ];
            
            let wordItem = palette[Math.floor(Math.random() * palette.length)];
            let colorItem = palette[Math.floor(Math.random() * palette.length)];
            
            stage.innerHTML = `
                <p style="font-size:1.3rem; font-weight:700; margin-bottom:5px; text-align:center;">QUAL A COR DO TEXTO?</p>
                <h1 style="font-size:4.5rem; color:${colorItem.color}; text-shadow: 3px 5px 15px rgba(0,0,0,0.7); margin:10px 0; font-weight:900; text-align:center;">${wordItem.name}</h1>
                <div id="stroop-opts"></div>`;
            
            let options = [colorItem]; 
            let remaining = palette.filter(item => item.color !== colorItem.color).sort(() => Math.random() - 0.5);
            
            for(let i = 0; i < 3; i++) options.push(remaining[i]);
            options.sort(() => Math.random() - 0.5);
            
            const container = stage.querySelector('#stroop-opts');
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'stroop-btn'; 
                let randomBgColor = palette[Math.floor(Math.random() * palette.length)].color;
                btn.style.background = randomBgColor;
                btn.innerText = opt.name;
                
                btn.onclick = () => {
                    if(opt.color === colorItem.color) { score += 35; level++; initLevel(); } 
                    else { alert("Incorreto! Foque apenas na COR do texto principal."); location.reload(); }
                };
                container.appendChild(btn);
            });
        }

        // --- 8. TIRO AO ALVO SÚBITO ---
        function playAlvo(stage) {
            stage.innerHTML = `<p style="text-align:center; font-weight:700; margin-bottom:10px;">CLIQUE NAS BOLAS! FUJA DA VERMELHA (❌)!</p>`;
            let targetsHit = 0; let targetGoal = 3 + level;
            function spawnBubble() {
                if(mode !== 'alvo' || targetsHit >= targetGoal) return;
                const bubble = document.createElement('div'); bubble.className = 'target-bubble';
                let isBomb = Math.random() < 0.25; let size = Math.max(55, 100 - (level * 3));
                bubble.style.width = size + 'px'; bubble.style.height = size + 'px';
                bubble.style.top = Math.random() * (stage.clientHeight - size - 60) + 40 + 'px';
                bubble.style.left = Math.random() * (stage.clientWidth - size - 20) + 10 + 'px';
                if (isBomb) {
                    bubble.style.background = 'var(--red)'; bubble.innerText = '❌';
                    bubble.onclick = () => { alert("Você explodiu a bomba!"); location.reload(); };
                } else {
                    bubble.style.background = ['var(--blue)', 'var(--green)', 'var(--cyan)', 'var(--purple)'][Math.floor(Math.random()*4)]; bubble.innerText = '🎯';
                    bubble.onclick = (e) => { e.stopPropagation(); bubble.remove(); targetsHit++; score += 15; document.getElementById('scr').innerText = score; if(targetsHit >= targetGoal) { level++; initLevel(); } };
                }
                stage.appendChild(bubble);
                setTimeout(() => { if(bubble) bubble.remove(); }, Math.max(700, 2000 - (level * 100)));
            }
            gameLoopInterval = setInterval(spawnBubble, Math.max(350, 900 - (level * 40)));
        }

        // --- 9. CADÊ O NÚMERO? ---
        function playProcurar(stage) {
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:15px; text-align:center;">ENCONTRE O ÚNICO NÚMERO ESCONDIDO!</p><div id="opts"></div>`;
            const container = stage.querySelector('#opts');
            let pool = ['X','Y','Z','W','K','P','H','A','#','$','&','@','?','*','%'];
            let hiddenNumber = Math.floor(Math.random() * 10).toString();
            let totalCells = Math.min(36, 16 + (level * 4));
            let items = Array.from({length: totalCells - 1}, () => pool[Math.floor(Math.random()*pool.length)]);
            items.push(hiddenNumber); items.sort(() => Math.random() - 0.5);
            items.forEach(item => {
                const cell = document.createElement('div'); cell.className = 'mem-card'; cell.style.width = '50px'; cell.style.height = '50px'; cell.style.fontSize = '1.3rem'; cell.innerText = item;
                cell.onclick = () => { if (item === hiddenNumber) { score += 40; level++; initLevel(); } else { alert("Incorreto!"); location.reload(); } };
                container.appendChild(cell);
            });
        }

        // --- 10. INVASÃO DE EMOJIS ---
        function playInvasao(stage) {
            let baseEmoji = ['🐱','🍏','🎈','🚗','⭐','🍕'][level % 6]; let intruderEmoji = ['🐶','🍎','🎁','🚲','🔥','🍔'][level % 6];
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:15px; text-align:center;">ACHE O INTRUSO DA REUNIÃO!</p><div id="opts" style="gap:10px; max-width:400px;"></div>`;
            const container = stage.querySelector('#opts'); let totalCount = Math.min(60, 20 + (level * 4)); let indexIntruder = Math.floor(Math.random() * totalCount);
            for(let i=0; i<totalCount; i++) {
                const box = document.createElement('span'); box.style.fontSize = '2.3rem'; box.style.cursor = 'pointer'; box.innerText = (i === indexIntruder) ? intruderEmoji : baseEmoji;
                box.onclick = () => { if(i === indexIntruder) { score += 45; level++; initLevel(); } else { alert("Incorreto!"); location.reload(); } };
                container.appendChild(box);
            }
        }

        // --- 11. SIMON ANTISSOCIAL ---
        function playSimonInverso(stage) {
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:15px; text-align:center;">REPITA NA <span style="color:var(--cyan)">ORDEM INVERSA</span>!</p><div class="color-grid"><div class="pad" style="background:var(--orange)"></div><div class="pad" style="background:var(--pink)"></div><div class="pad" style="background:var(--cyan)"></div><div class="pad" style="background:var(--purple)"></div></div>`;
            internalSeq = Array.from({length: Math.min(7, 2 + Math.floor(level/2))}, () => Math.floor(Math.random() * 4)); playerSeq = [];
            const pads = stage.querySelectorAll('.pad');
            async function showInverseSeq() {
                gameActive = false;
                for (let id of internalSeq) { await new Promise(r => setTimeout(r, 600)); if(pads[id]) pads[id].classList.add('active'); setTimeout(() => { if(pads[id]) pads[id].classList.remove('active') }, 400); }
                gameActive = true;
            }
            setTimeout(showInverseSeq, 500);
            pads.forEach((pad, idx) => {
                pad.onclick = () => {
                    if(!gameActive) return; pad.classList.add('active'); setTimeout(() => pad.classList.remove('active'), 200); playerSeq.push(idx);
                    let targetIdx = internalSeq.length - playerSeq.length;
                    if(playerSeq[playerSeq.length-1] !== internalSeq[targetIdx]) { alert("Ordem inversa incorreta!"); location.reload(); }
                    else if (playerSeq.length === internalSeq.length) { score += 60; level++; setTimeout(initLevel, 800); }
                };
            });
        }

        // --- 12. BALANÇA MENTAL ---
        function playBalanca(stage) {
            let n1 = Math.floor(Math.random()*9) + level, n2 = Math.floor(Math.random()*9) + 2;
            let n3 = Math.floor(Math.random()*9) + level, n4 = Math.floor(Math.random()*9) + 2;
            let leftVal = n1 + n2, rightVal = n3 + n4; if(leftVal === rightVal) leftVal += 3;
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:20px; text-align:center;">QUEM É MAIOR?</p><div id="stroop-opts"><button id="side-l" class="stroop-btn" style="background:var(--purple-light);">${n1} + ${n2}</button><button id="side-r" class="stroop-btn" style="background:var(--purple-light);">${n3} + ${n4}</button></div>`;
            stage.querySelector('#side-l').onclick = () => { if(leftVal > rightVal) { score += 30; level++; initLevel(); } else { alert("Incorreto!"); location.reload(); } };
            stage.querySelector('#side-r').onclick = () => { if(rightVal > leftVal) { score += 30; level++; initLevel(); } else { alert("Incorreto!"); location.reload(); } };
        }

        // --- 13. PARE OU SIGA ---
        function playSinal(stage) {
            let config = [
                { txt: 'CLIQUE', color: 'var(--green)', valid: true }, { txt: 'PARE', color: 'var(--red)', valid: false },
                { txt: 'CLIQUE', color: 'var(--red)', valid: false }, { txt: 'PARE', color: 'var(--green)', valid: false }
            ];
            let activeConfig = config[Math.floor(Math.random() * config.length)];
            stage.innerHTML = `<p style="font-weight:700; margin-bottom:10px; text-align:center;">SÓ CLIQUE SE FOR <span style="color:var(--green)">"CLIQUE" VERDE</span>!</p><h1 style="font-size:4.5rem; color:${activeConfig.color}; margin:20px 0; font-weight:900; background:rgba(0,0,0,0.2); padding:10px 40px; border-radius:15px; text-align:center;">${activeConfig.txt}</h1><div id="stroop-opts"><button id="action-btn" class="stroop-btn" style="background:var(--blue)">CLICAR</button><button id="skip-btn" class="stroop-btn" style="background:var(--gray)">IGNORAR</button></div>`;
            stage.querySelector('#action-btn').onclick = () => { if(activeConfig.valid) { score += 40; level++; initLevel(); } else { alert("Erro de impulso!"); location.reload(); } };
            stage.querySelector('#skip-btn').onclick = () => { if(!activeConfig.valid) { score += 40; level++; initLevel(); } else { alert("Você devia ter clicado!"); location.reload(); } };
        }

        // --- ENGINE DO RELÓGIO ---
        function startTimer() {
            document.getElementById('timer').innerText = timeLeft;
            timerId = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearAllMechanics(); alert("O tempo esgotou! Pontuação final: " + score); location.reload(); }
            }, 1000);
        }
    </script>
</body>
</html>
