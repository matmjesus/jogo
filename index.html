<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mente Ativa - Brain Games Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #250a52;
            --purple-light: #46178f;
            --blue: #3498db;
            --red: #e74c3c;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --pink: #e056fd;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, var(--purple-light), var(--purple-dark));
            color: white; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden;
            display: flex; 
            flex-direction: column;
            /* Impede seleção de texto acidental durante os cliques rápidos */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* TELA INICIAL */
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 20px; text-align: center;
            overflow-y: auto;
        }
        .logo { font-size: 3.5rem; font-weight: 900; margin-bottom: 40px; text-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; width: 100%; max-width: 1100px; padding-bottom: 20px;
        }
        .game-card {
            background: white; color: #333; padding: 25px; border-radius: 20px;
            cursor: pointer; border-bottom: 8px solid #ccc; font-weight: 900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .game-card span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* INTERFACE DE JOGO */
        #game-interface { display: none; flex: 1; position: relative; width: 100%; flex-direction: row; height: 100%; }
        
        .sidebar {
            width: 300px; background: rgba(0,0,0,0.3); padding: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        .main-stage { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; padding: 40px; position: relative; 
            overflow-y: auto; 
        }

        /* ESTILO ESPECÍFICO: GÊNIO DAS CORES */
        .color-grid { display: grid; grid-template-columns: repeat(2, 180px); gap: 20px; }
        .pad {
            width: 180px; height: 180px; border-radius: 25px; cursor: pointer;
            position: relative; border: 5px solid rgba(0,0,0,0.2);
            /* Previne o highlight padrão de toque no mobile */
            -webkit-tap-highlight-color: transparent; 
        }
        .pad.active { transform: scale(0.95); box-shadow: 0 0 60px white; filter: brightness(1.6); }
        .badge-click {
            position: absolute; background: white; color: black; padding: 6px 12px;
            border-radius: 50px; font-size: 0.8rem; top: -30px; left: 50%;
            transform: translateX(-50%); display: none; pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: popUp 0.3s ease; z-index: 5;
        }
        @keyframes popUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* OUTROS ELEMENTOS E CLASSES UTILITÁRIAS */
        .timer-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--red); background: rgba(255,255,255,0.1); }
        .btn-exit { position: absolute; top: 20px; right: 30px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 900; z-index: 10; }
        .mem-card { background: var(--blue); width: 100px; height: 100px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; border-bottom: 5px solid rgba(0,0,0,0.3); -webkit-tap-highlight-color: transparent; }
        .calc-title { font-size: 4rem; text-align: center; margin-top: 0; }
        .foco-item { font-size: 2.5rem; padding: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent;}
