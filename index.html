<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Ativa - Brain Games Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #250a52;
            --purple-light: #46178f;
            --blue: #3498db;
            --red: #e74c3c;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --white: #ffffff;
            --pink: #ff6b6b;
            --orange: #e67e22;
            --cyan: #1abc9c;
            --purple: #9b59b6;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, var(--purple-light), var(--purple-dark));
            color: white; margin: 0; 
            height: 100vh; height: 100dvh; 
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* TELA INICIAL */
        #home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px; text-align: center;
            overflow-y: auto;
        }
        .logo { font-size: 3.5rem; font-weight: 900; margin-bottom: 40px; text-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; width: 100%; max-width: 1100px;
        }
        .game-card {
            background: white; color: #333; padding: 25px; border-radius: 20px;
            cursor: pointer; border-bottom: 8px solid #ccc; font-weight: 900;
        }
        .game-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .game-card span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* INTERFACE DE JOGO */
        #game-interface { display: none; flex: 1; position: relative; width: 100%; }
        
        .sidebar {
            width: 300px; background: rgba(0,0,0,0.3); padding: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            border-right: 2px solid rgba(255,255,255,0.1);
            z-index: 2;
        }

        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; overflow-y: auto; }

        /* BOTÕES DE MARCAÇÃO GIGANTES */
        #opts { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 600px; }
        .calc-btn {
            background: white; color: #333; padding: 30px 55px; border-radius: 24px;
            cursor: pointer; border: none; border-bottom: 8px solid #ccc; font-weight: 900;
            font-size: 2.6rem; text-align: center; min-width: 160px;
        }
        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .calc-btn:active { transform: translateY(3px); border-bottom-width: 2px; }

        /* ESTILO ESPECÍFICO: GÊNIO DAS CORES */
        .color-grid { display: grid; grid-template-columns: repeat(2, 180px); gap: 20px; }
        .pad {
            width: 180px; height: 180px; border-radius: 25px; cursor: pointer;
            position: relative; border: 5px solid rgba(0,0,0,0.2);
        }
        .pad.active { transform: scale(0.95); box-shadow: 0 0 60px white; filter: brightness(1.6); }
        .badge-click {
            position: absolute; background: white; color: black; padding: 6px 12px;
            border-radius: 50px; font-size: 0.8rem; top: -30px; left: 50%;
            transform: translateX(-50%); display: none; pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: popUp 0.3s ease;
        }
        @keyframes popUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* OUTROS ELEMENTOS */
        .timer-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--red); background: rgba(255,255,255,0.1); }
        .btn-exit { position: absolute; top: 20px; right: 30px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 900; z-index: 10; }
        .mem-card { background: var(--blue); width: 100px; height: 100px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; border-bottom: 5px solid rgba(0,0,0,0.3); }

        /* ========================== MEDIA QUERIES (MOBILE) ========================== */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            
            /* Ajustes da Tela Inicial */
            #home-screen { padding: 20px 15px; justify-content: flex-start; }
            .logo { font-size: 2.2rem; margin-top: 20px; margin-bottom: 25px; }
            .menu-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
            .game-card { padding: 15px 10px; font-size: 0.85rem; border-bottom-width: 5px; }
            .game-card span { font-size: 1.8rem; margin-bottom: 5px; }

            /* Ajustes da Estrutura do Jogo */
            #game-interface { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; flex-direction: row; 
                padding: 15px 20px; border-right: none; 
                border-bottom: 2px solid rgba(255,255,255,0.1);
                justify-content: space-between;
            }
            .sidebar > div:first-child { text-align: left !important; }
            .sidebar h1 { font-size: 1.3rem; }
            .sidebar p { margin: 2px 0 0 0; font-size: 0.85rem; }
            .sidebar > div:last-child { display: none; }
            
            .timer-circle { width: 65px; height: 65px; font-size: 1.5rem; border-width: 4px; }
            .main-stage { padding: 20px 15px; flex: 1; }
            .btn-exit { position: absolute; top: 12px; right: 15px; padding: 6px 12px; font-size: 0.75rem; }

            /* Ajustes de Opções no Mobile */
            #opts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 100%; width: 92%; }
            .calc-btn { font-size: 2.2rem; padding: 25px 10px; border-bottom-width: 6px; min-width: 0; width: 100%; border-radius: 18px; }

            /* Dimensionamento responsivo de Elementos Visuais */
            .color-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 15px !important; width: 100%; max-width: 280px; }
            .pad { width: 100% !important; height: auto !important; aspect-ratio: 1 / 1 !important; border-radius: 15px !important; }
            .mem-card { width: 65px !important; height: 65px !important; font-size: 1.5rem !important; border-radius: 10px !important; }
            
            #stage h1 { font-size: 2.2rem !important; text-align: center; }
            #stage p { font-size: 1rem !important; text-align: center; }
            #stage span { font-size: 1.6rem !important; padding: 6px !important; }
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="logo">BRAIN GAMES PRO ⚡</div>
        <div class="menu-grid">
            <div class="game-card" onclick="loadGame('cores')" style="border-color: var(--yellow)"><span>✨</span>GÊNIO DAS CORES</div>
            <div class="game-card" onclick="loadGame('memoria')" style="border-color: var(--blue)"><span>🔢</span>PARES NUMÉRICOS</div>
            <div class="game-card" onclick="loadGame('calculo')" style="border-color: var(--red)"><span>➕</span>CÁLCULO RÁPIDO</div>
            <div class="game-card" onclick="loadGame('foco')" style="border-color: var(--green)"><span>🎯</span>FOCO SELETIVO</div>
            <div class="game-card" onclick="loadGame('ordem')" style="border-color: var(--pink)"><span>🔡</span>ORDEM CRESCENTE</div>
            <div class="game-card" onclick="loadGame('reacao')" style="border-color: #333"><span>🚀</span>VELOCIDADE LUZ</div>
            <div class="game-card" onclick="loadGame('matriz')" style="border-color: var(--yellow)"><span>🔲</span>PADRÃO MATRIZ</div>
            <div class="game-card" onclick="loadGame('stroop')" style="border-color: var(--pink)"><span>🎨</span>TESTE STROOP</div>
            <div class="game-card" onclick="loadGame('setas')" style="border-color: var(--blue)"><span>↔️</span>SETAS CONFLITANTES</div>
        </div>
    </div>

    <div id="game-interface">
        <button class="btn-exit" onclick="location.reload()">SAIR ➔</button>
        <div class="sidebar">
            <div style="text-align:center">
                <h1 id="mode-title" style="margin:0">JOGO</h1>
                <p>Level: <span id="lvl">1</span> | Score: <span id="scr">0</span></p>
            </div>
            <div class="timer-circle" id="timer">15</div>
            <div style="background:white; color:black; padding:15px; border-radius:15px; font-weight:900; text-align:center">
                RODADA ATIVA
            </div>
        </div>
        <div class="main-stage" id="stage"></div>
    </div>

    <script>
        let mode = ''; let level = 1; let score = 0; let timeLeft = 15;
        let timerId; let internalSeq = []; let playerSeq = []; let gameActive = false;

        // Banco expandido de ícones para suportar grades muito maiores em níveis altos
        const icons = ['🐶','🚀','🧠','💎','🔥','⭐','🌈','👾','🍀','🍕','🦁','🛸','🍎','🎸','👑','🎈','🚗','🦊','🦈','🍩'];

        function loadGame(m) {
            mode = m; level = 1; score = 0;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'flex';
            document.getElementById('mode-title').innerText = m.toUpperCase();
            initLevel();
        }

        function initLevel() {
            gameActive = true; timeLeft = 15;
            document.getElementById('lvl').innerText = level;
            document.getElementById('scr').innerText = score;
            const stage = document.getElementById('stage');
            stage.innerHTML = '';
            clearInterval(timerId);

            if (mode === 'cores') playCores(stage);
            else if (mode === 'memoria') playMemoria(stage);
            else if (mode === 'calculo') playCalculo(stage);
            else if (mode === 'foco') playFoco(stage);
            else if (mode === 'ordem') playOrdem(stage);
            else if (mode === 'reacao') playReacao(stage);
            else if (mode === 'matriz') playMatriz(stage);
            else if (mode === 'stroop') playStroop(stage);
            else if (mode === 'setas') playSetas(stage);

            startTimer();
        }

        // --- JOGO DAS CORES ---
        function playCores(stage) {
            stage.innerHTML = `<div class="color-grid" id="c-grid">
                <div class="pad" style="background:var(--blue)" onclick="handleColorClick(this, 0)"><div class="badge-click">CLICADO!</div></div>
                <div class="pad" style="background:var(--red)" onclick="handleColorClick(this, 1)"><div class="badge-click">CLICADO!</div></div>
                <div class="pad" style="background:var(--green)" onclick="handleColorClick(this, 2)"><div class="badge-click">CLICADO!</div></div>
                <div class="pad" style="background:var(--yellow)" onclick="handleColorClick(this, 3)"><div class="badge-click">CLICADO!</div></div>
            </div>`;
            
            internalSeq = Array.from({length: level + 1}, () => Math.floor(Math.random() * 4));
            playerSeq = [];
            runSequence();
        }

        async function runSequence() {
            gameActive = false;
            for (let id of internalSeq) {
                await new Promise(r => setTimeout(r, 600));
                const p = document.querySelectorAll('.pad')[id];
                p.classList.add('active');
                setTimeout(() => p.classList.remove('active'), 400);
            }
            gameActive = true;
        }

        function handleColorClick(el, id) {
            if (!gameActive) return;
            
            el.classList.add('active');
            const b = el.querySelector('.badge-click');
            b.style.display = 'block';
            setTimeout(() => { el.classList.remove('active'); b.style.display = 'none'; }, 300);

            playerSeq.push(id);
            if (playerSeq[playerSeq.length-1] !== internalSeq[playerSeq.length-1]) {
                alert("Sequência Errada!"); location.reload();
            } else if (playerSeq.length === internalSeq.length) {
                score += 50; level++; setTimeout(initLevel, 800);
            }
        }

        // --- 🔢 PARES NUMÉRICOS ATUALIZADO (DIFICULDADE CRESCENTE POR NÍVEL) ---
        function playMemoria(stage) {
            // Define a quantidade de pares escalando a cada nível (Nível 1 = 2 pares, Nível 2 = 3 pares, Nível 3 = 4 pares...)
            // O limite máximo é definido pelo tamanho do banco de ícones (20 pares = 40 cartas)
            let pairs = Math.min(20, 1 + level); 
            let totalCards = pairs * 2;
            let deck = [...icons.slice(0, pairs), ...icons.slice(0, pairs)].sort(() => Math.random() - 0.5);
            let flipped = [];
            
            // Calcula as colunas de forma inteligente para manter o formato do grid simétrico
            let cols = 2;
            if (totalCards % 5 === 0 && totalCards !== 10) cols = 5;
            else if (totalCards % 4 === 0) cols = 4;
            else if (totalCards % 3 === 0) cols = 3;
            else if (totalCards > 10) cols = 4;

            stage.innerHTML = `<p style="font-size:1.2rem;margin-bottom:15px;">ENCONTRE OS PARES! (${totalCards} PEÇAS)</p>
                               <div id="mem-grid" style="display:grid; grid-template-columns:repeat(${cols}, 1fr); gap:10px; width:100%; max-width:420px;"></div>`;
            const grid = stage.querySelector('#mem-grid');

            deck.forEach((icon) => {
                const c = document.createElement('div'); 
                c.className = 'mem-card'; 
                
                // Configurações responsivas para caber perfeitamente na tela do celular sem quebrar
                c.style.setProperty('width', '100%', 'important');
                c.style.setProperty('height', 'auto', 'important');
                c.style.setProperty('aspect-ratio', '1', 'important');
                
                // Diminui o emoji caso haja muitas cartas na tela
                c.style.fontSize = totalCards > 16 ? '1.3rem' : (totalCards > 8 ? '1.7rem' : '2rem');
                c.innerText = '?';
                
                c.onclick = () => {
                    if (flipped.length < 2 && !c.classList.contains('flipped')) {
                        c.classList.add('flipped'); 
                        c.innerText = icon; 
                        c.style.background = 'white'; 
                        c.style.color = 'black';
                        flipped.push(c);
                        
                        if (flipped.length === 2) {
                            if (flipped[0].innerText === flipped[1].innerText) { 
                                score += 20; 
                                flipped = []; 
                                if (grid.querySelectorAll('.flipped').length === deck.length) { 
                                    level++; 
                                    setTimeout(initLevel, 1000); 
                                } 
                            } else { 
                                setTimeout(() => { 
                                    flipped.forEach(x => { 
                                        x.classList.remove('flipped'); 
                                        x.innerText = '?'; 
                                        x.style.background = 'var(--blue)'; 
                                        x.style.color = 'white'; 
                                    }); 
                                    flipped = []; 
                                }, 800); 
                            }
                        }
                    }
                };
                grid.appendChild(c);
            });
        }

        // --- ➕ CÁLCULO RÁPIDO ---
        function playCalculo(stage) {
            let a = Math.floor(Math.random() * (10 * level)) + 1;
            let b = Math.floor(Math.random() * (10 * level)) + 1;
            let res = a + b;
            
            stage.innerHTML = `<h1 style="font-size:3.5rem; margin-bottom:25px;">${a} + ${b} = ?</h1><div id="opts"></div>`;
            const optsContainer = stage.querySelector('#opts');
            
            let optionsSet = new Set([res]);
            let pool = [10, -10, 1, -1, 2, -2, 20, -20];
            
            for (let v of pool) {
                if (optionsSet.size >= 4) break;
                let fake = res + v;
                if (fake > 0) optionsSet.add(fake);
            }
            
            while (optionsSet.size < 4) {
                optionsSet.add(res + Math.floor(Math.random() * 10) + 1);
            }
            
            let options = Array.from(optionsSet).sort(() => Math.random() - 0.5);
            
            options.forEach(o => {
                const btn = document.createElement('button'); 
                btn.className = 'calc-btn'; 
                btn.innerText = o;
                btn.onclick = () => { 
                    if(o === res) { 
                        score += 30; level++; initLevel(); 
                    } else { 
                        alert("Errado! O resultado correto era: " + res); 
                        location.reload(); 
                    } 
                };
                optsContainer.appendChild(btn);
            });
        }

        function playFoco(stage) {
            let chars = ['M', 'W', 'N']; let main = chars[level % 3], intruder = 'H';
            for(let i=0; i<30+(level*5); i++) {
                const d = document.createElement('span'); d.style.fontSize = '2.5rem'; d.style.padding = '10px'; d.style.cursor = 'pointer';
                d.innerText = main;
                if(i === 15) { d.innerText = intruder; d.onclick = () => { score += 40; level++; initLevel(); } }
                stage.appendChild(d);
                stage.style.flexDirection = 'row'; stage.style.flexWrap = 'wrap';
            }
        }

        function playOrdem(stage) {
            let nums = Array.from({length: 3+level}, () => Math.floor(Math.random()*100));
            let sorted = [...nums].sort((a,b) => a-b); let idx = 0;
            stage.style.flexDirection = 'row'; stage.style.flexWrap = 'wrap'; stage.style.gap = '15px';
            nums.forEach(n => {
                const b = document.createElement('div'); b.className = 'mem-card'; b.innerText = n;
                b.onclick = () => { if(n === sorted[idx]) { b.style.opacity = '0'; idx++; if(idx === nums.length) { score += 50; level++; initLevel(); } } else location.reload(); };
                stage.appendChild(b);
            });
        }

        function playReacao(stage) {
            stage.innerHTML = '<h1>AGUARDE O VERDE...</h1>';
            setTimeout(() => {
                stage.innerHTML = '<div id="target" style="width:230px;height:230px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer"><h1>CLIQUE!</h1></div>';
                stage.querySelector('#target').onclick = () => { score += 100; level++; initLevel(); };
            }, 1000 + Math.random() * 3000);
        }

        // --- 🔲 PADRÃO MATRIZ ---
        function playMatriz(stage) {
            let side = Math.min(6, 2 + (level - 1));
            let size = side * side;
            let count = Math.min(size - 2, 1 + level);
            
            stage.innerHTML = `<p style="font-size:1.2rem;margin-bottom:15px;">DECORE O PADRÃO ILUMINADO!</p>
                               <div id="matrix-grid" style="display:grid; grid-template-columns:repeat(${side}, 1fr); gap:6px; width:100%; max-width:340px; aspect-ratio:1;"></div>`;
            const grid = stage.querySelector('#matrix-grid');
            
            let activeTiles = [];
            while(activeTiles.length < count) {
                let r = Math.floor(Math.random() * size);
                if(!activeTiles.includes(r)) activeTiles.push(r);
            }
            
            let playerTiles = []; gameActive = false;
            
            for(let i=0; i<size; i++) {
                const tile = document.createElement('div');
                tile.style.background = 'rgba(255,255,255,0.15)';
                tile.style.borderRadius = side >= 5 ? '6px' : '12px';
                tile.style.cursor = 'pointer';
                tile.dataset.id = i;
                grid.appendChild(tile);
                if(activeTiles.includes(i)) tile.style.background = 'var(--yellow)';
            }
            
            let memorizeTime = 1000 + (count * 180);
            
            setTimeout(() => {
                grid.querySelectorAll('div').forEach(t => t.style.background = 'rgba(255,255,255,0.15)');
                gameActive = true;
                grid.querySelectorAll('div').forEach(tile => {
                    tile.onclick = () => {
                        if(!gameActive) return;
                        let id = parseInt(tile.dataset.id);
                        if(activeTiles.includes(id)) {
                            if(!playerTiles.includes(id)) {
                                playerTiles.push(id);
                                tile.style.background = 'var(--green)';
                                if(playerTiles.length === activeTiles.length) { score += 40; level++; setTimeout(initLevel, 600); }
                            }
                        } else {
                            tile.style.background = 'var(--red)'; gameActive = false;
                            setTimeout(() => { alert("Padrão Incorreto!"); location.reload(); }, 200);
                        }
                    };
                });
            }, memorizeTime);
        }

        // --- 🎯 TESTE DE STROOP ---
        function playStroop(stage) {
            const palette = [
                { name: 'AZUL', color: 'var(--blue)' },
                { name: 'VERMELHO', color: 'var(--red)' },
                { name: 'VERDE', color: 'var(--green)' },
                { name: 'AMARELO', color: 'var(--yellow)' },
                { name: 'ROSA', color: 'var(--pink)' },
                { name: 'LARANJA', color: 'var(--orange)' },
                { name: 'CIANO', color: 'var(--cyan)' },
                { name: 'ROXO', color: 'var(--purple)' }
            ];
            
            let wordItem = palette[Math.floor(Math.random() * palette.length)];
            let colorItem = palette[Math.floor(Math.random() * palette.length)];
            
            stage.innerHTML = `<p style="font-size:1.2rem;margin-bottom:5px;">QUAL A COR DO TEXTO?</p>
                               <h1 style="font-size:3.8rem; color:${colorItem.color}; text-shadow: 2px 4px 10px rgba(0,0,0,0.4); margin:15px 0;">${wordItem.name}</h1>
                               <div id="opts"></div>`;
            
            let options = [colorItem];
            let remaining = palette.filter(item => item.color !== colorItem.color);
            remaining.sort(() => Math.random() - 0.5);
            
            for(let i = 0; i < 3; i++) {
                options.push(remaining[i]);
            }
            
            options.sort(() => Math.random() - 0.5);
            
            const container = stage.querySelector('#opts');
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'calc-btn'; 
                btn.style.background = opt.color;
                btn.style.border = '4px solid rgba(0,0,0,0.2)'; 
                btn.style.height = '100px';
                btn.onclick = () => {
                    if(opt.color === colorItem.color) { 
                        score += 30; level++; initLevel(); 
                    } else { 
                        alert("Incorreto! Você deve focar na cor, não na palavra."); 
                        location.reload(); 
                    }
                };
                container.appendChild(btn);
            });
        }

        // --- ⚡ SETAS CONFLITANTES ---
        function playSetas(stage) {
            let isRight = Math.random() > 0.5;
            let isCongruent = Math.random() > 0.5;
            let arrowStr = isRight ? (isCongruent ? '>>>>>' : '<<><<') : (isCongruent ? '<<<<<' : '>><>>');
            
            stage.innerHTML = `<p style="font-size:1.2rem;margin-bottom:5px;">FOQUE APENAS NA SETA DO CENTRO!</p>
                               <h1 style="font-size:4rem; letter-spacing:8px; margin:20px 0; color:var(--yellow); text-shadow:0 5px 15px rgba(0,0,0,0.3);">${arrowStr}</h1>
                               <div id="opts">
                                   <button id="b-left" class="calc-btn">◀</button>
                                   <button id="b-right" class="calc-btn">▶</button>
                               </div>`;
                               
            stage.querySelector('#b-left').onclick = () => { if(!isRight) { score += 35; level++; initLevel(); } else { alert("Direção errada!"); location.reload(); } };
            stage.querySelector('#b-right').onclick = () => { if(isRight) { score += 35; level++; initLevel(); } else { alert("Direção errada!"); location.reload(); } };
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerId); alert("Fim de Jogo! Score: " + score); location.reload(); }
            }, 1000);
        }
    </script>
